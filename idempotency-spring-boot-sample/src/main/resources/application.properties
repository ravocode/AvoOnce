# ===================================================================
# AvoOnce Idempotency Sample Configuration
# ===================================================================

# Storage Backend Selection: caffeine, jdbc, or redis
# Since all three idempotency backend dependencies are on the classpath,
# you must explicitly select the backend.
# Default is set to 'caffeine' (in-memory).
avoonce.idempotency.store=caffeine

# Uncomment to use Redis instead:
# avoonce.idempotency.store=redis

# -------------------------------------------------------------------
# JDBC / Database Configuration (Only active when store=jdbc)
# -------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:idempotency_sample;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Automatically create the idempotency schema table on startup
avoonce.idempotency.jdbc.auto-ddl=true
